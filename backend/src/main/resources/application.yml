server:
  port: ${PORT:8082}

spring:
  application:
    name: expense-tracker
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  web:
    resources:
      add-mappings: true
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# Custom application properties
app:
  jwt:
    # 512-bit strong base64 encoded secret key
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

logging:
  level:
    root: INFO
    com.expensetracker: INFO
    org.hibernate.SQL: ${HIBERNATE_LOG_LEVEL:INFO}
