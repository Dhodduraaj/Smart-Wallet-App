<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="shifu-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>
  </defs>
  <style>
    @keyframes earTwitchLeft {
      0%, 90%, 100% { transform: rotate(0deg); }
      93%, 97% { transform: rotate(-4deg); }
    }
    @keyframes earTwitchRight {
      0%, 85%, 100% { transform: rotate(0deg); }
      88%, 92% { transform: rotate(4deg); }
    }
    .ear-left {
      animation: earTwitchLeft 5s ease-in-out infinite;
      transform-origin: 32px 34px;
    }
    .ear-right {
      animation: earTwitchRight 4.5s ease-in-out infinite;
      transform-origin: 68px 34px;
    }
    @keyframes slowNod {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .head-group {
      animation: slowNod 4s ease-in-out infinite;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#shifu-bg)" stroke="#ffffff" stroke-width="2" />
  
  <!-- Left Ear -->
  <path class="ear-left" d="M 20,38 L 12,16 L 36,28 Z" fill="#b45309" />
  <path class="ear-left" d="M 21,34 L 16,20 L 32,27 Z" fill="#ffffff" />

  <!-- Right Ear -->
  <path class="ear-right" d="M 80,38 L 88,16 L 64,28 Z" fill="#b45309" />
  <path class="ear-right" d="M 79,34 L 84,20 L 68,27 Z" fill="#ffffff" />

  <g class="head-group">
    <!-- Face -->
    <ellipse cx="50" cy="56" rx="24" ry="18" fill="#b45309" />
    <!-- White Cheeks/Snout -->
    <path d="M 28,54 C 28,66 38,70 50,70 C 62,70 72,66 72,54 Z" fill="#ffffff" />
    <ellipse cx="50" cy="53" rx="18" ry="14" fill="#b45309" />
    <!-- Wise Eyebrows (overlapping eyes) -->
    <path d="M 24,42 Q 36,36 46,44" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    <path d="M 76,42 Q 64,36 54,44" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" />
    <!-- Eyes -->
    <circle cx="37" cy="48" r="2.5" fill="#059669" />
    <circle cx="63" cy="48" r="2.5" fill="#059669" />
    <circle cx="37" cy="48" r="1" fill="#111827" />
    <circle cx="63" cy="48" r="1" fill="#111827" />
    <!-- Nose & Mustache -->
    <polygon points="48,53 52,53 50,55" fill="#111827" />
    <path d="M 46,56 Q 50,62 54,56" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
