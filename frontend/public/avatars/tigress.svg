<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="tigress-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f857a6" />
      <stop offset="100%" stop-color="#ff5858" />
    </linearGradient>
  </defs>
  <style>
    @keyframes sway {
      0%, 100% { transform: rotate(-1.5deg) translateY(0); }
      50% { transform: rotate(1.5deg) translateY(-1px); }
    }
    .anim-group {
      animation: sway 4s ease-in-out infinite;
      transform-origin: 50% 90%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#tigress-bg)" stroke="#ffffff" stroke-width="2" />
  <g class="anim-group">
    <!-- Ears -->
    <path d="M 22,38 L 18,24 L 32,32 Z" fill="#b45309" />
    <path d="M 78,38 L 82,24 L 68,32 Z" fill="#b45309" />
    <path d="M 23,36 L 20,27 L 30,32 Z" fill="#fca5a5" />
    <path d="M 77,36 L 80,27 L 70,32 Z" fill="#fca5a5" />
    <!-- Face -->
    <ellipse cx="50" cy="54" rx="26" ry="22" fill="#d97706" />
    <!-- Cheeks (white) -->
    <path d="M 24,54 C 24,66 38,72 50,72 C 62,72 76,66 76,54" fill="#ffffff" />
    <ellipse cx="50" cy="52" rx="22" ry="17" fill="#d97706" />
    <!-- Stripes -->
    <!-- Forehead -->
    <path d="M 46,32 L 50,38 L 54,32 Z" fill="#1f2937" />
    <path d="M 42,33 L 48,37 M 58,33 L 52,37" stroke="#1f2937" stroke-width="2" stroke-linecap="round" />
    <!-- Cheek Stripes -->
    <path d="M 26,52 L 34,53 M 74,52 L 66,53" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round" />
    <!-- Eyes -->
    <ellipse cx="38" cy="48" rx="6" ry="4" fill="#f59e0b" />
    <ellipse cx="62" cy="48" rx="6" ry="4" fill="#f59e0b" />
    <circle cx="38" cy="48" r="3" fill="#111827" />
    <circle cx="62" cy="48" r="3" fill="#111827" />
    <circle cx="39" cy="47" r="1" fill="#ffffff" />
    <circle cx="63" cy="47" r="1" fill="#ffffff" />
    <!-- Nose -->
    <polygon points="47,54 53,54 50,57" fill="#1f2937" />
    <path d="M 50,57 L 50,62 Q 47,65 44,63 M 50,62 Q 53,65 56,63" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
