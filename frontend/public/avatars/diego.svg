<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="diego-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#bdc3c7" />
    </linearGradient>
  </defs>
  <style>
    @keyframes earTwitch {
      0%, 92%, 100% { transform: rotate(0deg); }
      94%, 98% { transform: rotate(3deg); }
    }
    .ear {
      animation: earTwitch 4s ease-in-out infinite;
      transform-origin: 50% 50%;
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .head {
      animation: breathe 3.5s ease-in-out infinite;
      transform-origin: 50% 90%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#diego-bg)" stroke="#ffffff" stroke-width="2" />
  
  <g class="head">
    <!-- Ears -->
    <path class="ear" d="M 28,34 L 18,18 L 36,26 Z" fill="#d97706" />
    <path class="ear" d="M 72,34 L 82,18 L 64,26 Z" fill="#d97706" />
    <path d="M 29,32 L 22,22 L 34,26 Z" fill="#fca5a5" />
    <path d="M 71,32 L 78,22 L 66,26 Z" fill="#fca5a5" />

    <!-- Face -->
    <ellipse cx="50" cy="50" rx="22" ry="18" fill="#f59e0b" />
    <!-- Cheeks (lighter) -->
    <path d="M 28,50 Q 50,66 72,50 C 72,62 62,68 50,68 C 38,68 28,62 28,50 Z" fill="#fbbf24" />

    <!-- Eyes (feline) -->
    <ellipse cx="39" cy="42" rx="4.5" ry="3" fill="#facc15" />
    <ellipse cx="61" cy="42" rx="4.5" ry="3" fill="#facc15" />
    <circle cx="39" cy="42" r="1.5" fill="#1e293b" />
    <circle cx="61" cy="42" r="1.5" fill="#1e293b" />

    <!-- Nose -->
    <polygon points="46,49 54,49 50,53" fill="#111827" />

    <!-- Fangs (Saber teeth) -->
    <path d="M 42,54 L 40,66 L 45,56 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="0.5" />
    <path d="M 58,54 L 60,66 L 55,56 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="0.5" />
  </g>
</svg>
