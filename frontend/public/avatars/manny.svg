<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="manny-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a307f" />
      <stop offset="100%" stop-color="#79a7d3" />
    </linearGradient>
  </defs>
  <style>
    @keyframes trunkBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(2px) rotate(2deg); }
    }
    .trunk {
      animation: trunkBob 3.5s ease-in-out infinite;
      transform-origin: 50% 50%;
    }
    @keyframes slowBreathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.99, 1.01); }
    }
    .head {
      animation: slowBreathe 4s ease-in-out infinite;
      transform-origin: 50% 90%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#manny-bg)" stroke="#ffffff" stroke-width="2" />
  
  <g class="head">
    <!-- Tusks -->
    <path d="M 28,56 Q 14,58 16,42 Q 18,36 24,48 Z" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <path d="M 72,56 Q 86,58 84,42 Q 82,36 76,48 Z" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />

    <!-- Ears -->
    <ellipse cx="26" cy="46" rx="6" ry="9" fill="#5c3a21" />
    <ellipse cx="74" cy="46" rx="6" ry="9" fill="#5c3a21" />

    <!-- Head & Hair -->
    <ellipse cx="50" cy="50" rx="24" ry="20" fill="#78350f" />
    <path d="M 32,36 Q 50,22 68,36" fill="none" stroke="#451a03" stroke-width="8" stroke-linecap="round" />

    <!-- Eyes -->
    <circle cx="40" cy="44" r="3" fill="#ffffff" />
    <circle cx="60" cy="44" r="3" fill="#ffffff" />
    <circle cx="40" cy="44" r="1.5" fill="#3b82f6" />
    <circle cx="60" cy="44" r="1.5" fill="#3b82f6" />

    <!-- Trunk -->
    <path class="trunk" d="M 47,52 L 44,72 C 43,76 49,78 51,76 L 53,52 Z" fill="#5c3a21" />
  </g>
</svg>
