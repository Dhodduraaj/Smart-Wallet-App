<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="oogway-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134e5e" />
      <stop offset="100%" stop-color="#71b280" />
    </linearGradient>
  </defs>
  <style>
    @keyframes slowBreathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(0.98, 1.01); }
    }
    .anim-group {
      animation: slowBreathe 4.5s ease-in-out infinite;
      transform-origin: 50% 90%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#oogway-bg)" stroke="#ffffff" stroke-width="2" />
  <g class="anim-group">
    <!-- Neck -->
    <path d="M 42,65 Q 50,45 46,75" fill="none" stroke="#6b7280" stroke-width="8" stroke-linecap="round" />
    <path d="M 48,60 C 42,75 58,75 52,60" fill="#10b981" />
    <!-- Collar of Shell -->
    <path d="M 32,74 Q 50,65 68,74 Z" fill="#78350f" />
    <!-- Head -->
    <ellipse cx="50" cy="46" rx="15" ry="18" fill="#059669" />
    <!-- Chin/Wrinkles -->
    <path d="M 44,54 Q 50,57 56,54" fill="none" stroke="#047857" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 46,57 Q 50,60 54,57" fill="none" stroke="#047857" stroke-width="1.5" stroke-linecap="round" />
    <!-- Eyes (closed/wise look) -->
    <path d="M 38,44 Q 44,40 46,45" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" />
    <path d="M 62,44 Q 56,40 54,45" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" />
    <!-- Eyebrows -->
    <path d="M 36,39 Q 44,35 48,40" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <path d="M 64,39 Q 56,35 52,40" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <!-- Mouth (gentle smile) -->
    <path d="M 45,50 Q 50,53 55,50" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
