<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="scrat-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f" />
      <stop offset="100%" stop-color="#feb47b" />
    </linearGradient>
  </defs>
  <style>
    @keyframes jitter {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-0.5px, 0.5px) rotate(-0.5deg); }
      20%, 40%, 60%, 80% { transform: translate(0.5px, -0.5px) rotate(0.5deg); }
    }
    .anim-group {
      animation: jitter 0.8s infinite;
      transform-origin: 50% 50%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#scrat-bg)" stroke="#ffffff" stroke-width="2" />
  
  <g class="anim-group">
    <!-- Squirrel Ears -->
    <ellipse cx="38" cy="24" rx="5" ry="9" fill="#a16207" />
    <ellipse cx="62" cy="24" rx="5" ry="9" fill="#a16207" />
    <ellipse cx="38" cy="25" rx="3" ry="6" fill="#fca5a5" />
    <ellipse cx="62" cy="25" rx="3" ry="6" fill="#fca5a5" />

    <!-- Big Crazy Eyes -->
    <circle cx="41" cy="38" r="8" fill="#ffffff" stroke="#78350f" stroke-width="1" />
    <circle cx="59" cy="38" r="8" fill="#ffffff" stroke="#78350f" stroke-width="1" />
    <circle cx="42" cy="38" r="3" fill="#111827" />
    <circle cx="58" cy="38" r="3" fill="#111827" />
    <circle cx="43" cy="37" r="1" fill="#ffffff" />
    <circle cx="59" cy="37" r="1" fill="#ffffff" />

    <!-- Snout (long nose) -->
    <path d="M 44,45 L 36,68 C 36,72 64,72 64,68 L 56,45 Z" fill="#ca8a04" />
    <circle cx="50" cy="68" r="3" fill="#111827" />

    <!-- Acorn (held at bottom) -->
    <g transform="translate(50, 78)">
      <!-- Nut -->
      <path d="M -6,0 C -6,6 6,6 6,0 Z" fill="#b45309" />
      <!-- Cap -->
      <path d="M -7,0 Q 0,-5 7,0 Z" fill="#78350f" />
      <!-- Stem -->
      <rect x="-1" y="-7" width="2" height="4" fill="#78350f" />
    </g>
  </g>
</svg>
