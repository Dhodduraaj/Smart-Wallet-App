<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="sid-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5af19" />
      <stop offset="100%" stop-color="#f12711" />
    </linearGradient>
  </defs>
  <style>
    @keyframes wobble {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .anim-group {
      animation: wobble 3s ease-in-out infinite;
      transform-origin: 50% 85%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#sid-bg)" stroke="#ffffff" stroke-width="2" />
  <g class="anim-group">
    <!-- Long Goofy Neck -->
    <path d="M 46,75 Q 50,55 50,52 Q 50,55 54,75 Z" fill="#d8b4fe" />
    <path d="M 45,78 L 47,56 L 53,56 L 55,78 Z" fill="#e2e8f0" />
    <!-- Head -->
    <ellipse cx="50" cy="50" rx="14" ry="18" fill="#e2e8f0" />
    <!-- Eyes sticking out (goofy wide) -->
    <circle cx="33" cy="42" r="6.5" fill="#ffffff" />
    <circle cx="67" cy="42" r="6.5" fill="#ffffff" />
    <circle cx="34" cy="42" r="2.5" fill="#1f2937" />
    <circle cx="66" cy="42" r="2.5" fill="#1f2937" />
    <!-- Eyebrows (crooked) -->
    <path d="M 28,34 Q 34,32 38,36" fill="none" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 72,34 Q 66,32 62,36" fill="none" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" />
    <!-- Snout & Buck Teeth -->
    <ellipse cx="50" cy="56" rx="9" ry="8" fill="#cbd5e1" />
    <circle cx="50" cy="52" r="1.5" fill="#1e293b" />
    <!-- Teeth -->
    <rect x="47" y="60" width="3" height="4" fill="#ffffff" rx="0.5" />
    <rect x="50" y="60" width="3" height="4" fill="#ffffff" rx="0.5" />
    <!-- Smile -->
    <path d="M 43,59 Q 50,64 57,59" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
