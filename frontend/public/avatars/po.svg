<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="po-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>
  </defs>
  <style>
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .anim-group {
      animation: breathe 3s ease-in-out infinite;
      transform-origin: 50% 90%;
    }
  </style>
  <circle cx="50" cy="50" r="46" fill="url(#po-bg)" stroke="#ffffff" stroke-width="2" />
  <g class="anim-group">
    <!-- Ears -->
    <ellipse cx="28" cy="30" rx="9" ry="8" fill="#1f2937" />
    <ellipse cx="72" cy="30" rx="9" ry="8" fill="#1f2937" />
    <!-- Face -->
    <ellipse cx="50" cy="54" rx="28" ry="24" fill="#ffffff" />
    <!-- Eye Patches -->
    <ellipse cx="38" cy="48" rx="8" ry="10" fill="#1f2937" transform="rotate(-10 38 48)" />
    <ellipse cx="62" cy="48" rx="8" ry="10" fill="#1f2937" transform="rotate(10 62 48)" />
    <!-- Eyes -->
    <circle cx="39" cy="48" r="3" fill="#10b981" />
    <circle cx="61" cy="48" r="3" fill="#10b981" />
    <circle cx="39.5" cy="47" r="1.2" fill="#ffffff" />
    <circle cx="61.5" cy="47" r="1.2" fill="#ffffff" />
    <!-- Nose -->
    <polygon points="46,55 54,55 50,59" fill="#111827" />
    <!-- Cheeks/Smile -->
    <path d="M 43,62 Q 50,67 57,62" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
